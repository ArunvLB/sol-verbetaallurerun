name: Selenium Allure Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"  # 5:30 PM IST daily

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: selenium-allure-pages
  cancel-in-progress: true

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -y
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Run Selenium TestNG suite
        working-directory: ai-automation-framework/tests/selenium
        run: |
          mvn clean test \
            -Dsurefire.suiteXmlFiles=testng-first-78.xml \
            -Dmaven.test.failure.ignore=true \
            -s .mvn/settings.xml \
            -Dmaven.repo.local=.m2repo

      - name: Generate Allure HTML report
        working-directory: ai-automation-framework/tests/selenium
        run: npx --yes allure-commandline generate target/allure-results -o target/allure-report --clean

      - name: Upload Allure results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: ai-automation-framework/tests/selenium/target/allure-results
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Surefire reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: ai-automation-framework/tests/selenium/target/surefire-reports
          if-no-files-found: warn
          retention-days: 14

      - name: Upload GitHub Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: ai-automation-framework/tests/selenium/target/allure-report

  deploy:
    needs: test-and-publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
