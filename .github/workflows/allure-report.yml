name: Scheduled Selenium Tests

on:
  schedule:
    - cron: '0 12 * * *' # 5:30 PM IST (12:00 PM UTC)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Tests
        working-directory: ai-automation-framework/tests/selenium
        run: |
          chmod +x mvnw
          ./mvnw clean test -Dsurefire.suiteXmlFiles=testng-first-78.xml -Dmaven.test.failure.ignore=true

      - name: Generate Allure Report
        working-directory: ai-automation-framework/tests/selenium
        run: |
          npx allure-commandline generate target/allure-results -o target/allure-report --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ai-automation-framework/tests/selenium/target/allure-report
          publish_branch: gh-pages
